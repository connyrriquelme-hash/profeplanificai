function publicar(){const tags=[];$$('#pubTags input[type=checkbox]:checked').forEach(c=>tags.push(c.value));const post={id:genId(),autor:$('pubUser').value.trim()||'Docente anónimo',titulo:$('pubTit').value.trim(),tipo:$('pubTipo').value,nivel:$('pubNivel').value,asignatura:$('pubAsig').value,contenido:$('pubCont').value.trim(),etiquetas:tags,fecha:new Date().toISOString(),likes:0,comentarios:[]};if(!post.titulo||!post.contenido){toast('Completa título y contenido','err');return}savePost(post);cerrarPub();$('pubTit').value='';$('pubCont').value='';$$('#pubTags input[type=checkbox]').forEach(c=>c.checked=false);$$('#pubTags .pub-tag-sel').forEach(l=>l.classList.remove('pub-tag-sel'));renderPubList();renderColabSidebar();toast('Publicación compartida','ok');updateBadges()}
function renderPubList(){const q=$('pubSearch')?.value.toLowerCase()||'';const fn=$('pubFiltroNivel')?.value||'';const fa=$('pubFiltroAsig')?.value||'';const ft=$('pubFiltroTag')?.value||'';let posts=getPosts();if(fn)posts=posts.filter(p=>p.nivel===fn);if(fa)posts=posts.filter(p=>p.asignatura===fa);if(ft)posts=posts.filter(p=>p.etiquetas&&p.etiquetas.includes(ft));if(q)posts=posts.filter(p=>p.titulo.toLowerCase().includes(q)||p.contenido.toLowerCase().includes(q)||(p.etiquetas||[]).some(e=>e.toLowerCase().includes(q)));$('pubCount').textContent=posts.length+' publicación'+(posts.length!==1?'es':'');

<div class="pub-body">${esc(p.contenido).slice(0,400)}${p.contenido.length>400?'...':''}</div>
${p.etiquetas&&p.etiquetas.length?`<div class="pub-tags">${p.etiquetas.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}

function renderColabSidebar(){const posts=getPosts();const top=posts.slice().sort((a,b)=>(b.likes||0)-(a.likes||0)).slice(0,3);$('pubTopList').innerHTML=top.length?top.map(p=>`<div class="resource-item" style="padding:10px;cursor:pointer" onclick="document.getElementById('pubSearch').value='${esc(p.titulo)}';renderPubList()"><b style="font-size:12px">${esc(p.titulo)}</b><span style="display:flex;gap:6px;font-size:10px;color:var(--muted);margin-top:2px"><span>${p.likes||0} 👍</span><span>${(p.comentarios||[]).length} 💬</span></span></div>`).join(''):'<p class="muted" style="font-size:11px">Sin publicaciones aún.</p>';
const tagCount={};posts.forEach(p=>(p.etiquetas||[]).forEach(t=>{tagCount[t]=(tagCount[t]||0)+1}));const sorted=Object.entries(tagCount).sort((a,b)=>b[1]-a[1]);$('pubTagCloud').innerHTML=sorted.length?sorted.map(([t,n])=>`<span class="tag" style="cursor:pointer;font-size:${10+Math.min(n,5)*2}px" onclick="document.getElementById('pubFiltroTag').value='${t}';renderPubList()">${t} (${n})</span>`).join(''):'<p class="muted" style="font-size:11px">Sin etiquetas aún.</p>'}

function delPub(id){if(confirm('¿Eliminar esta publicación?')){delPost(id);renderPubList();renderColabSidebar();toast('Publicación eliminada','ok');updateBadges()}}
function comentar(id){const inp=$('cmt-'+id);if(!inp||!inp.value.trim())return;addCmt(id,{id:genId(),autor:'Docente',texto:inp.value,fecha:new Date().toISOString()});inp.value='';renderPubList()}
function copiarPub(t){navigator.clipboard.writeText(t).then(()=>toast('Contenido copiado','ok')).catch(()=>toast('Error al copiar','err'))}
function usarRecursoColab(id){const p=getPosts().find(x=>x.id===id);if(!p)return;const txt='Título: '+p.titulo+'\nTipo: '+p.tipo+'\nNivel: '+p.nivel+'\nAsignatura: '+p.asignatura+'\n\n'+p.contenido;navigator.clipboard.writeText(txt).then(()=>{toast('Recurso copiado al portapapeles. Pégalo en el módulo que necesites.','ok')}).catch(()=>toast('Error al copiar','err'))}

<div class="two-col"><div><div class="card" style="padding:14px"><div class="drive-meta"><div class="search-bar" style="flex:1;min-width:140px"><span class="search-icon"><i data-lucide="search" style="width:14px;height:14px"></i></span><input id="dSearch" placeholder="Buscar en Drive..." oninput="renderDriveLista()" style="padding-left:34px"></div>
<select id="dFiltroTipo" onchange="renderDriveLista()" style="width:auto;min-width:100px;font-size:11px;padding:6px 10px"><option value="">Todos tipo</option>${DRIVE_TIPOS_V.map(x=>`<option value="${x.v}">${x.l}</option>`).join('')}</select>
<select id="dFiltroNivel" onchange="renderDriveLista()" style="width:auto;min-width:100px;font-size:11px;padding:6px 10px"><option value="">Todos nivel</option>${NIVELES.map(x=>`<option>${x}</option>`).join('')}</select>
<select id="dFiltroAsig" onchange="renderDriveLista()" style="width:auto;min-width:100px;font-size:11px;padding:6px 10px"><option value="">Todas asig.</option>${ASIG.map(x=>`<option>${x}</option>`).join('')}</select>
<button class="small ghost" onclick="limpiarFiltrosDrive()" title="Limpiar filtros"><i data-lucide="x" style="width:12px;height:12px"></i></button></div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px"><span id="dCount" style="font-size:11px;color:var(--muted)"></span>
<span id="dFolderBreadcrumb" style="font-size:11px;color:var(--muted)"></span></div></div>
<div id="driveFolderArea" style="margin-bottom:4px"></div>
<div id="driveList" class="resource-list"></div></div>
<div><div class="card"><h3><i data-lucide="folder-tree" style="width:14px;height:14px;color:var(--brand2)"></i> Carpetas</h3><div id="driveFolderList"></div></div>
<div class="card"><h3><i data-lucide="bar-chart-3" style="width:14px;height:14px;color:var(--brand2)"></i> Resumen</h3><div id="driveResumen"></div></div></div></div>`;renderDriveFolders();renderDriveResumen();renderDriveLista();if(typeof lucide!=='undefined')lucide.createIcons()}
function mostrarSubirDrive(){openModal('subirDriveModal')}
function cerrarSubirDrive(){closeModal('subirDriveModal')}
function subirDriveDoc(){const n=$('dName').value.trim();const c=$('dCont').value.trim();if(!n||!c){toast('Nombre y contenido requeridos','err');return}saveDrive({id:genId(),nombre:n,tipo:$('dTipo').value,contenido:c,nivel:$('dNivel').value,asignatura:$('dAsig').value,carpetaId:$('dCarpeta').value||null,fecha:new Date().toISOString(),tamano:c.length});cerrarSubirDrive();$('dName').value='';$('dCont').value='';renderDriveLista();renderDriveFolders();renderDriveResumen();toast('Documento guardado en Drive','ok');updateBadges()}
function mostrarNuevaCarpeta(){$('carpetaModalTitle').textContent='Nueva carpeta';$('dCarpetaNombre').value='';$('dCarpetaNombre').dataset.editId='';openModal('carpetaModal')}
function cerrarCarpetaModal(){closeModal('carpetaModal')}
function guardarCarpeta(){const n=$('dCarpetaNombre').value.trim();if(!n){toast('Nombre requerido','err');return}const editId=$('dCarpetaNombre').dataset.editId;let f=getDriveFolders();if(editId){const i=f.findIndex(x=>x.id===editId);if(i>-1){f[i].nombre=n;saveDriveFolders(f);toast('Carpeta renombrada','ok')}}else{f.push({id:genId(),nombre:n,fecha:new Date().toISOString()});saveDriveFolders(f);toast('Carpeta creada','ok')}cerrarCarpetaModal();renderDriveFolders();renderDriveUI()}
function mostrarRenameCarpeta(id){const f=getDriveFolders().find(x=>x.id===id);if(!f)return;$('carpetaModalTitle').textContent='Renombrar carpeta';$('dCarpetaNombre').value=f.nombre;$('dCarpetaNombre').dataset.editId=id;openModal('carpetaModal')}
function eliminarCarpeta(id){if(!confirm('¿Eliminar esta carpeta? Los documentos dentro pasarán a la raíz.'))return;let f=getDriveFolders();f=f.filter(x=>x.id!==id);saveDriveFolders(f);let d=getDrive();d.forEach(item=>{if(item.carpetaId===id)item.carpetaId=null});lss('planificaia_drive',d);renderDriveFolders();renderDriveLista();renderDriveResumen();toast('Carpeta eliminada','ok')}
function seleccionarCarpeta(id){_driveFolder=_driveFolder===id?null:id;renderDriveFolders();renderDriveLista()}
function renderDriveFolders(){const f=getDriveFolders();$('driveFolderList').innerHTML=f.length?`<div class="drive-folder-grid">${f.map(fo=>`<div class="drive-folder-card${_driveFolder===fo.id?' active':''}" onclick="seleccionarCarpeta('${fo.id}')"><div class="folder-icon">📁</div><div class="folder-name">${esc(fo.nombre)}</div><div class="folder-count">${getDrive().filter(x=>x.carpetaId===fo.id).length} docs</div><div class="btnrow" style="justify-content:center;margin-top:6px"><button class="small ghost" onclick="event.stopPropagation();mostrarRenameCarpeta('${fo.id}')" title="Renombrar"><i data-lucide="pencil" style="width:10px;height:10px"></i></button><button class="small danger" onclick="event.stopPropagation();eliminarCarpeta('${fo.id}')" title="Eliminar"><i data-lucide="trash-2" style="width:10px;height:10px"></i></button></div></div>`).join('')}</div>`:'<p class="muted" style="font-size:11px">Sin carpetas. Crea una para organizar tus documentos.</p>';_driveFolder&&(getDriveFolders().find(x=>x.id===_driveFolder)?0:_driveFolder=null);if(typeof lucide!=='undefined')lucide.createIcons()}
function renderDriveResumen(){const d=getDrive();const total=d.length;const tipos={};const nivs={};d.forEach(i=>{tipos[i.tipo]=(tipos[i.tipo]||0)+1;if(i.nivel)nivs[i.nivel]=(nivs[i.nivel]||0)+1});const tipoStr=Object.entries(tipos).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([t,n])=>`${DRIVE_TIPOS_V.find(x=>x.v===t)?.l||t}: ${n}`).join(' · ');$('driveResumen').innerHTML=`<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px"><div style="text-align:center;padding:10px;background:var(--bg2);border-radius:8px"><div style="font-size:24px;font-weight:800;color:var(--brand2)">${total}</div><small>Documentos</small></div><div style="text-align:center;padding:10px;background:var(--bg2);border-radius:8px"><div style="font-size:24px;font-weight:800;color:var(--muted)">${getDriveFolders().length}</div><small>Carpetas</small></div></div>${total?`<p style="font-size:11px;color:var(--muted);margin-top:10px"><b>Por tipo:</b> ${tipoStr}</p>`:''}${total?`<p style="font-size:11px;color:var(--muted);margin-top:4px"><b>Total:</b> ${(d.reduce((s,i)=>s+(i.tamano||0),0)/1024).toFixed(1)} KB</p>`:''}`}
function limpiarFiltrosDrive(){$('dSearch').value='';$('dFiltroTipo').value='';$('dFiltroNivel').value='';$('dFiltroAsig').value='';renderDriveLista()}
function renderDriveLista(){const q=$('dSearch')?.value.toLowerCase()||'';const tf=$('dFiltroTipo')?.value||'';const nf=$('dFiltroNivel')?.value||'';const af=$('dFiltroAsig')?.value||'';let items=getDrive();if(_driveFolder)items=items.filter(i=>i.carpetaId===_driveFolder);if(tf)items=items.filter(i=>i.tipo===tf);if(nf)items=items.filter(i=>i.nivel===nf);if(af)items=items.filter(i=>i.asignatura===af);if(q)items=items.filter(i=>i.nombre.toLowerCase().includes(q)||(i.contenido||'').toLowerCase().includes(q)||(i.nivel||'').toLowerCase().includes(q)||(i.asignatura||'').toLowerCase().includes(q));$('dCount').textContent=items.length+' documento'+(items.length!==1?'s':'');const bread=_driveFolder?`${esc(getDriveFolders().find(x=>x.id===_driveFolder)?.nombre||'')} › `:'';$('dFolderBreadcrumb').textContent=bread;
$('driveList').innerHTML=items.length?items.map(i=>{const tipoLabel=DRIVE_TIPOS_V.find(x=>x.v===i.tipo)?.l||i.tipo||'Documento';const tClass=i.tipo||'documento';return `<div class="drive-item-card"><div style="display:flex;gap:10px;align-items:flex-start"><div class="drive-item-icon ${tClass}">${tClass==='planificacion'?'📋':tClass==='recurso'?'📦':tClass==='evaluacion'?'📝':tClass==='rubrica'?'📊':'📄'}</div><div style="flex:1;min-width:0"><b style="font-size:13px;cursor:pointer" onclick="mostrarDetailDrive('${i.id}')">${esc(i.nombre)}</b><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:2px"><span class="tag" style="font-size:9px">${tipoLabel}</span>${i.nivel?`<span class="tag" style="font-size:9px">${esc(i.nivel)}</span>`:''}${i.asignatura?`<span class="tag" style="font-size:9px">${esc(i.asignatura)}</span>`:''}<span style="font-size:10px;color:var(--muted)">${i.fecha?new Date(i.fecha).toLocaleDateString('es-CL'):''} · ${((i.tamano||0)/1024).toFixed(1)}KB</span></div></div></div>
<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px"><button class="small secondary" onclick="mostrarDetailDrive('${i.id}')"><i data-lucide="eye" style="width:11px;height:11px"></i> Ver</button>
<button class="small ghost" onclick="mostrarMoveDrive('${i.id}')"><i data-lucide="move" style="width:11px;height:11px"></i> Mover</button>
<button class="small ghost" onclick="duplicarDrive('${i.id}')"><i data-lucide="copy" style="width:11px;height:11px"></i> Duplicar</button>
<button class="small ghost" onclick="exportarDocumento({titulo:i.nombre,nivel:i.nivel,asignatura:i.asignatura,oa:'',contenido:i.contenido,tipo:i.tipo||'Documento',action:'txt'})"><i data-lucide="file-text" style="width:11px;height:11px"></i> TXT</button>
<button class="small ghost" onclick="exportarDocumento({titulo:i.nombre,nivel:i.nivel,asignatura:i.asignatura,oa:'',contenido:i.contenido,tipo:i.tipo||'Documento',action:'html'})"><i data-lucide="file-code" style="width:11px;height:11px"></i> HTML</button>
<button class="small danger" onclick="eliminarDrive('${i.id}')"><i data-lucide="trash-2" style="width:11px;height:11px"></i></button></div></div>`}).join(''):`<div class="empty-state" style="padding:30px"><div class="empty-state-icon"><i data-lucide="${q||tf||nf||af?'search':'folder'}" style="width:22px;height:22px"></i></div><b>${q||tf||nf||af?'Sin resultados':'Drive vacío'}</b><span>${q||tf||nf||af?'Prueba con otros filtros.':'Sube documentos o genera recursos desde los módulos principales.'}</span></div>`;if(typeof lucide!=='undefined')lucide.createIcons()}
function mostrarDetailDrive(id){_driveDetail=id;const i=getDrive().find(x=>x.id===id);if(!i)return;const tipoLabel=DRIVE_TIPOS_V.find(x=>x.v===i.tipo)?.l||i.tipo||'Documento';$('dDetailTitle').textContent=esc(i.nombre);$('dDetailMeta').innerHTML=`<span class="tag">${tipoLabel}</span>${i.nivel?` <span class="tag">${esc(i.nivel)}</span>`:''}${i.asignatura?` <span class="tag">${esc(i.asignatura)}</span>`:''} · ${i.fecha?new Date(i.fecha).toLocaleDateString('es-CL'):''} · ${((i.tamano||0)/1024).toFixed(1)} KB`;$('dDetailBody').textContent=i.contenido||'';openModal('detailDriveModal')}
function cerrarDetailDrive(){closeModal('detailDriveModal')}
function eliminarDrive(id){if(!confirm('¿Eliminar este documento?'))return;delDrive(id);renderDriveLista();renderDriveResumen();renderDriveFolders();toast('Documento eliminado','ok');updateBadges()}
function duplicarDrive(id){const i=getDrive().find(x=>x.id===id);if(!i)return;saveDrive({...i,id:genId(),nombre:'[Copia] '+i.nombre,fecha:new Date().toISOString()});renderDriveLista();renderDriveResumen();renderDriveFolders();toast('Documento duplicado','ok')}
function mostrarMoveDrive(id){_driveMoveId=id;$('dMoveDestino').value='';openModal('moveModal')}
function cerrarMoveModal(){closeModal('moveModal')}
function ejecutarMoveDrive(){const dest=$('dMoveDestino').value||null;let d=getDrive();const i=d.findIndex(x=>x.id===_driveMoveId);if(i>-1){d[i].carpetaId=dest;lss('planificaia_drive',d);cerrarMoveModal();renderDriveLista();renderDriveResumen();renderDriveFolders();toast('Documento movido','ok')}}
function descargarDriveTxt(id){const i=getDrive().find(x=>x.id===id);if(!i)return;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([i.contenido||''],{type:'text/plain'}));a.download=(i.nombre.replace(/[^a-zA-Z0-9áéíóúñ ]/g,'')+'.txt').replace(/ /g,'_');a.click();toast('Descargado como .txt','ok')}
function descargarDriveHtml(id){const i=getDrive().find(x=>x.id===id);if(!i)return;const html='<!doctype html><meta charset="utf-8"><title>'+esc(i.nombre)+'</title><style>body{font-family:Arial;padding:2cm;line-height:1.6;max-width:800px;margin:0 auto}h1{font-size:20px}b{color:#2563eb}</style><body><h1>'+esc(i.nombre)+'</h1><hr>'+md(i.contenido||'')+'<hr><p style="color:#999;font-size:11px">Generado con PlanificaIA Chile</p></body>';const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));a.download=(i.nombre.replace(/[^a-zA-Z0-9áéíóúñ ]/g,'')+'.html').replace(/ /g,'_');a.click();toast('Descargado como .html','ok')}
function imprimirDrive(id){const i=getDrive().find(x=>x.id===id);if(!i)return;const w=window.open('','_blank');w.document.write('<!doctype html><meta charset="utf-8"><title>'+esc(i.nombre)+'</title><style>body{font-family:Arial;padding:2cm;line-height:1.6;max-width:800px;margin:0 auto}h1{font-size:20px}b{color:#2563eb}</style><body><h1>'+esc(i.nombre)+'</h1><hr>'+md(i.contenido||'')+'</body>');w.document.close();w.print()}
function importMats(){getMats().forEach(m=>{if(!getDrive().some(i=>i.nombre===m.titulo))saveDrive({id:genId(),nombre:m.titulo,tipo:'documento',contenido:m.contenido||'',nivel:m.nivel||'',asignatura:m.asignatura||'',carpetaId:null,fecha:new Date().toISOString(),tamano:(m.contenido||'').length})});renderDriveLista();renderDriveResumen();renderDriveFolders();toast('Materiales importados','ok')}
// ─── CONFIG ────────────────────────────────────────────────────────────────
function renderConfig(){const c=cfg();$('v-config').innerHTML=`
<div class="section-title"><i data-lucide="settings" style="width:20px;height:20px;color:var(--brand2)"></i>Conectar IA</div>
<div class="card"><h2>Configuración de proveedor IA</h2><p class="section-sub">La app funciona sin API key. Si conectas un proveedor, tu clave se guarda solo en este navegador (localStorage). Si falla la conexión, vuelve automáticamente a modo local.</p>
<div class="grid"><div><label>Proveedor</label><select id="cfgProv">${[{v:'local',l:'Local sin clave'},{v:'gemini',l:'Gemini API'},{v:'openrouter',l:'OpenRouter'},{v:'huggingface',l:'Hugging Face'}].map(p=>`<option value="${p.v}"${c.provider===p.v?' selected':''}>${p.l}</option>`).join('')}</select></div>
<div><label>Modelo (opcional)</label><input id="cfgModel" value="${esc(c.model)}" placeholder="Ej.: gemini-2.0-flash"></div></div>
<label>API key</label><input id="cfgKey" type="password" value="${esc(c.apiKey)}" placeholder="API key del proveedor">
<div class="btnrow"><button class="primary" onclick="guardarCfg()">Guardar</button><button class="secondary" onclick="probarCfg()">Probar IA</button><button class="danger" onclick="resetCfg()">Modo local</button></div>
<div id="s-cfg" class="status">${c.provider==='local'?'Modo local activo.':'Configuración guardada.'}</div></div>
<div class="card" style="border-color:rgba(239,68,68,.2)"><div style="display:flex;gap:10px;align-items:flex-start"><i data-lucide="shield-alert" style="width:18px;height:18px;color:var(--error);flex-shrink:0;margin-top:1px"></i><div><b style="color:var(--error);font-size:13px">Advertencia de seguridad</b><p style="font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5">Esta app guarda tu API key en localStorage del navegador. Esto es aceptable para uso personal y pruebas. Para un despliegue en producción, debes usar un backend proxy (Node.js, Cloudflare Worker, etc.) para no exponer tu clave en el frontend. Eres responsable del uso de tu API key.</p></div></div></div>
<div class="card"><h3>Generadores externos gratuitos</h3><ul style="padding-left:18px;line-height:1.8;color:var(--muted);font-size:13px">${['Google AI Studio / Gemini','Hugging Face Spaces','Canva / Adobe Express','Copilot / ChatGPT Free'].map(x=>`<li>${x}</li>`).join('')}</ul></div>`}
function guardarCfg(){const c={provider:$('cfgProv').value,model:$('cfgModel').value.trim(),apiKey:$('cfgKey').value.trim()};saveCfg(c);$('s-cfg').textContent=c.provider==='local'?'Modo local guardado.':'Configuración guardada.';$('s-cfg').className='status ok';toast(c.provider==='local'?'Modo local activado':'Configuración guardada','ok');initNav()}
function resetCfg(){localStorage.removeItem('planificaia_cfg');$('cfgProv').value='local';$('cfgModel').value='';$('cfgKey').value='';updatePill();$('s-cfg').textContent='Modo local activado.';$('s-cfg').className='status ok';toast('Modo local activado','ok');initNav()}
async function probarCfg(){guardarCfg();$('s-cfg').textContent='Probando motor central de IA...';$('s-cfg').className='status';
const r=await generarConIA({tipo:'planificacion',nivel:$('cfgProv').value==='local'?'2° básico':'2° básico',asignatura:'Lenguaje y Comunicación',oa:'OA 6: Leer y comprender textos narrativos',tema:'Comprensión de fábulas',duracion:'90 min',estudiantes:32,necesidades:'3 estudiantes con dificultades lectoras',estilo:'resumido',dificultad:'Progresiva',contexto:'Escuela rural multigrado',
onStatus:(msg,cls)=>{$('s-cfg').textContent=msg;$('s-cfg').className=cls||'status'},
onOutput:(html,text)=>{const pre=document.createElement('details');pre.innerHTML='<summary style="cursor:pointer;color:var(--muted);font-size:12px">Ver contenido generado</summary><pre style="margin-top:8px;padding:12px;background:var(--bg2);border-radius:8px;font-size:11px;max-height:300px;overflow:auto;color:var(--muted)">'+esc(text.slice(0,800))+'</pre>';$('s-cfg').parentNode.appendChild(pre);toast('Prueba completada: motor central IA OK','ok')}});
if(!r.ok&&$('s-cfg').textContent!=='Generado en modo local'){$('s-cfg').textContent='[ERROR] '+r.error;$('s-cfg').className='status bad';toast('Error en prueba: '+r.error,'err')}}

// ─── COMMON ACTIONS ────────────────────────────────────────────────────────
function copiar(id){const el=$('o-'+id)||$(id);navigator.clipboard.writeText(el._md||el.innerText).then(()=>alert('Copiado.'))}
function descargar(id,nombre){const el=$('o-'+id)||$(id);const html='<!doctype html><meta charset="utf-8"><body style="font-family:Arial;padding:2cm;line-height:1.5">'+el.innerHTML+'</body>';const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));a.download=nombre;a.click()}
function limpiar(oid,sid,msg){$(oid==='o-'?oid:'o-'+oid).innerHTML='';$(sid==='s-'?sid:'s-'+sid).textContent=msg;$('s-'+(sid.replace('s-',''))).className='status'}
function guardarMat(tipo,oid){const el=$(oid);const md=el._md||el.innerText;if(!md)return;saveMat({id:genId(),tipo,titulo:tipo.charAt(0).toUpperCase()+tipo.slice(1)+' - '+new Date().toLocaleDateString('es-CL'),contenido:md,nivel:'',asignatura:'',oa:'',fecha:new Date().toISOString(),etiquetas:[]});const st=$('s-'+oid.replace('o-',''));if(st){st.textContent='[OK] Guardado en Mis materiales.';st.className='status ok'}}

// ─── MATERIALES GUARDADOS ──────────────────────────────────────────────────
function renderMateriales(vista){const mats=getMats().filter(m=>m.tipo===vista||vista==='todos');return mats.length?mats.map(m=>`<div class="resource-item"><b>${esc(m.titulo)}</b><span class="muted" style="font-size:11px">${new Date(m.fecha).toLocaleString('es-CL')}</span><div class="btnrow"><button class="small secondary">Cargar</button><button class="small danger" onclick="delMat('${m.id}')">Eliminar</button></div></div>`).join(''):'<p class="muted">Sin materiales guardados.</p>'}

// ─── INIT ──────────────────────────────────────────────────────────────────
function init(){initNav();renderInicio();renderPlanificador();renderRecursos();renderEvaluaciones();renderBanco();renderColaboracion();renderDrive();renderDocente();renderConfig();updatePill();syncOA();if(ls('planificaia_compact',false)){document.body.classList.add('compact-mode');const b=$('compactToggle');if(b)b.innerHTML='<i data-lucide="maximize-2" style="width:14px;height:14px"></i>'}if(typeof lucide!=='undefined')lucide.createIcons();updateBadges()}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
